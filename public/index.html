<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Website Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <div class="brand-block">
          <span class="brand-kicker">network</span>
          <div class="brand-mark">GWV</div>
        </div>

        <nav class="nav-pill" aria-label="Primary">
          <a href="#viewer">Live Viewer</a>
          <a href="#controls">Proxy Controls</a>
          <a href="#status">Status</a>
        </nav>

        <button class="theme-cta" type="button">Launch Global View</button>
      </header>

      <section class="hero">
        <p class="eyebrow">Interactive geo-browser</p>
        <h1>Open websites from anywhere.</h1>
        <p class="hero-copy">
          Route a live Playwright browser through your selected country proxy and interact with it in real
          time through the WebRTC viewer.
        </p>
      </section>

      <section class="controls-panel" id="controls">
        <article class="info-card status-card" id="status">
          <span class="card-chip">Session Status</span>
          <p id="statusText">Ready</p>
          <p id="countryLabel"></p>
        </article>

        <article class="info-card form-card">
          <span class="card-chip">Session Setup</span>
          <section class="controls">
            <label>
              Website URL
              <input id="urlInput" type="url" placeholder="https://example.com" value="https://example.com" />
            </label>

            <label>
              Country
              <select id="countrySelect"></select>
            </label>

            <button id="openBtn">Open Website</button>
          </section>
        </article>
      </section>

      <section class="viewer-wrap" id="viewer">
        <video
          id="viewerVideo"
          playsinline
          autoplay
          muted
          tabindex="0"
          aria-label="Live remote browser stream"
        ></video>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
